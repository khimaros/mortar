<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff772f"/>
      <stop offset="1" stop-color="#ffb347"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g fill="#4a6b8a">
    <rect x="22" y="28" width="54" height="6" rx="3"/>
    <rect x="22" y="42" width="72" height="6" rx="3"/>
  </g>

  <g>
    <rect x="22" y="61" width="26" height="6" rx="3" fill="#7fb2d9"/>
    <rect x="78" y="61" width="28" height="6" rx="3" fill="#7fb2d9"/>
    <rect x="50" y="58" width="26" height="12" rx="3" fill="url(#fill)" filter="url(#glow)"/>
    <rect x="49" y="54" width="2.5" height="20" fill="#fff8e8" opacity="0.9"/>
  </g>

  <g fill="#4a6b8a">
    <rect x="22" y="80" width="64" height="6" rx="3"/>
    <rect x="22" y="94" width="44" height="6" rx="3"/>
  </g>
</svg>
